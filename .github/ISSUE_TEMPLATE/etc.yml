name: ETC
description: 리팩토링, 성능 개선 등 기타 작업을 위한 템플릿입니다.
title: "[etc]: "
body:
  - type: markdown
    attributes:
      value: |
        ## 기타 작업
        기능 추가나 버그 수정 외의 작업(리팩토링, 환경 설정 등) 내용을 작성해 주세요.
  - type: checkboxes
    id: development-type
    attributes:
      label: 작업 유형
      description: 해당되는 항목을 모두 선택해 주세요.
      options:
        - label: 리팩토링 (Refactoring)
        - label: 성능 개선 (Performance)
        - label: 환경 설정 (Config)
        - label: 문서 수정 (Docs)
        - label: 기타 (Etc)
  - type: textarea
    id: rationale
    attributes:
      label: 작업 배경
      description: 왜 이 작업이 필요한지 설명해 주세요.
      placeholder: 코드의 가독성을 높이기 위해 불필요한 코드를 제거합니다.
    validations:
      required: true
  - type: textarea
    id: task-details
    attributes:
      label: 작업 상세 내용
      description: 어떤 작업을 진행할 것인지 자세히 적어주세요.
      placeholder: |
        - [ ] 컴포넌트 A 분리
        - [ ] 공통 훅 추출
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료 (선택)
      description: 관련 링크, 스크린샷 등이 있다면 첨부해 주세요.
    validations:
      required: false
