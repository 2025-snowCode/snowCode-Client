name: Feature request
description: 새로운 기능이나 아이디어를 제안해 주세요.
title: "[feat]: "
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 제안
        새로운 기능을 제안하거나 기존 기능을 개선하고 싶으신가요? 아래 내용을 작성해 주세요.
  - type: textarea
    id: feature-description
    attributes:
      label: 어떤 기능인가요?
      description: 제안하려는 기능의 목적과 기대 효과를 간략히 설명해 주세요.
      placeholder: 예시) 다크 모드 기능을 추가하여 시력을 보호하고 싶습니다.
    validations:
      required: true
  - type: textarea
    id: task-details
    attributes:
      label: 작업 상세 내용
      description: 어떻게 구현하면 좋을지, 어떤 작업들이 필요한지 적어주세요.
      placeholder: |
        - [ ] 테마 상태 관리 추가
        - [ ] CSS 변수 적용
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료 (선택)
      description: 디자인 시안, 관련 라이브러리, 또는 참고할 만한 예시 링크를 첨부해 주세요.
    validations:
      required: false
